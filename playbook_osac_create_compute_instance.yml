---
- name: Create a compute instance from a ComputeInstance
  hosts: localhost
  gather_facts: false

  vars:
    compute_instance: "{{ ansible_eda.event.payload }}"
    compute_instance_name: "{{ ansible_eda.event.payload.metadata.name }}"
    template_id: "{{ ansible_eda.event.payload.spec.templateID }}"
    template_parameters: {}

  pre_tasks:
    - name: Show EDA Event
      ansible.builtin.debug:
        var: ansible_eda.event.payload

    # Brings in variables:
    # compute_instance_working_namespace
    - name: Determine working namespace
      ansible.builtin.include_role:
        name: osac.service.compute_instance_working_namespace

    # VM cluster kubeconfig for tenant StorageClass discovery and template.
    # When unset or empty, the management cluster is used as the VM cluster.
    - name: Set VM cluster kubeconfig from environment
      ansible.builtin.set_fact:
        remote_cluster_kubeconfig: "{{ lookup('env', 'OSAC_REMOTE_CLUSTER_KUBECONFIG') | default('', true) }}"

    # Discover tenant StorageClass on VM cluster; sets tenant_storage_class_name
    - name: Discover tenant StorageClass
      ansible.builtin.include_role:
        name: osac.service.tenant_storage_class
      vars:
        tenant_storage_class_tenant_name: "{{ compute_instance.status.tenantReference.name }}"
        kubeconfig: "{{ remote_cluster_kubeconfig if (remote_cluster_kubeconfig | length > 0) else omit }}"
      when:
        - compute_instance.status.tenantReference is defined
        - compute_instance.status.tenantReference.name is defined

  tasks:

    - name: Display compute instance information
      ansible.builtin.debug:
        msg:
          - "Compute instance name: {{ compute_instance_name }}"
          - "Compute instance working namespace: {{ compute_instance_working_namespace }}"
          - "Template ID: {{ template_id }}"
          - "Template parameters: {{ template_parameters }}"

    - name: "Set the finalizer on the OSAC compute instance {{ compute_instance_name }}"
      ansible.builtin.include_role:
        name: osac.service.finalizer
      vars:
        finalizer_state: present
        finalizer_name: "{{ compute_instance_osac_finalizer }}"
        finalizer_target:
          api_version: osac.openshift.io/v1alpha1
          kind: ComputeInstance
          namespace: "{{ compute_instance.metadata.namespace }}"
          name: "{{ compute_instance_name }}"

    - name: Call the selected compute instance template
      ansible.builtin.include_role:
        name: "{{ template_id }}"
        tasks_from: "create"

---
- name: Show node requests
  ansible.builtin.debug:
    var: cluster_infra_node_requests

# Handle scale down **before** scale up.

- name: Retrieve all currently allocated node pools
  kubernetes.core.k8s_info:
    api_version: hypershift.openshift.io/v1beta1
    kind: NodePool
    namespace: "{{ cluster_working_namespace }}"
  register: current_node_pools

- name: Set resource classes included in the request
  ansible.builtin.set_fact:
    requested_resource_classes: >
      {{ cluster_infra_node_requests | map(attribute='resourceClass') }}

- name: Determine which resource classes are no longer needed
  ansible.builtin.set_fact:
    removed_resource_classes: "{{ removed_resource_classes | default([]) + [item.metadata.labels[agent_resource_class_label]] }}"
  with_items: "{{ current_node_pools.resources }}"
  when:
    - item.metadata.labels is defined
    - agent_resource_class_label in item.metadata.labels
    - item.metadata.labels[agent_resource_class_label] not in requested_resource_classes

- name: Display additional resource classes to be removed
  ansible.builtin.debug:
    msg: "The following resource classes are no longer requested: {{ removed_resource_classes | default([]) }}"

- name: Initialize updated cluster infra node requests that will include removed resource classes
  ansible.builtin.set_fact:
    updated_cluster_infra_node_requests: "{{ cluster_infra_node_requests }}"

- name: Add removed resource classes to updated cluster infra node requests
  ansible.builtin.set_fact:
    updated_cluster_infra_node_requests: "{{ updated_cluster_infra_node_requests + [{'numberOfNodes': '0', 'resourceClass': item}] }}"
  with_items: "{{ removed_resource_classes | default([]) }}"

- name: Wait for the Agents to be removed from the cluster
  ansible.builtin.include_role:
    name: osac.service.manage_agents
    tasks_from: wait_for_agents_to_be_removed
  vars:
    manage_agents_cluster_order_name: "{{ cluster_infra_name }}"
    manage_agents_desired_count: "{{ item.numberOfNodes | int }}"
    manage_agents_resource_class: "{{ item.resourceClass }}"
  loop: "{{ updated_cluster_infra_node_requests }}"

- name: Set skip network detach and attach for Netris
  ansible.builtin.set_fact:
    manage_agents_skip_network_detach: true
    manage_agents_skip_network_attach: true

- name: Detach agents from cluster
  ansible.builtin.include_role:
    name: osac.service.manage_agents
    tasks_from: detach_and_unlabel_all_removed_agents
  vars:
    manage_agents_cluster_order_name: "{{ cluster_infra_name }}"

- name: List already allocated agents
  kubernetes.core.k8s_info:
    kind: Agent
    api_version: agent-install.openshift.io/v1beta1
    namespace: "{{ default_agent_namespace }}"
    label_selectors:
      - "{{ cluster_order_label }}={{ cluster_infra_name }}"
  register: _existing_cluster_agents

- name: Record already allocated agent names
  ansible.builtin.set_fact:
    _existing_agent_names: "{{ _existing_cluster_agents.resources | map(attribute='metadata.name') | list }}"

- name: Select and label new Agent resources
  ansible.builtin.include_role:
    name: osac.service.manage_agents
    tasks_from: select_and_label_new_agents
  vars:
    manage_agents_cluster_order_name: "{{ cluster_infra_name }}"
    manage_agents_desired_count: "{{ item.numberOfNodes | int }}"
    manage_agents_resource_class: "{{ item.resourceClass }}"
  loop: "{{ cluster_infra_node_requests }}"

- name: List agents allocated to this cluster
  kubernetes.core.k8s_info:
    kind: Agent
    api_version: agent-install.openshift.io/v1beta1
    namespace: "{{ default_agent_namespace }}"
    label_selectors:
      - "{{ cluster_order_label }}={{ cluster_infra_name }}"
  register: cluster_agents_for_netris

- name: Initialize server names list
  ansible.builtin.set_fact:
    cluster_infra_netris_server_names: []
  when:
    - cluster_agents_for_netris.resources | length > 0
    - netris_agent_server_name_label is defined

- name: Build server names list from agent labels
  ansible.builtin.set_fact:
    cluster_infra_netris_server_names: "{{ cluster_infra_netris_server_names + [item.metadata.labels[netris_agent_server_name_label]] }}"
  loop: "{{ cluster_agents_for_netris.resources }}"
  when:
    - cluster_agents_for_netris.resources | length > 0
    - netris_agent_server_name_label is defined
    - item.metadata.labels is defined
    - netris_agent_server_name_label in item.metadata.labels

- name: Deduplicate server names list
  ansible.builtin.set_fact:
    cluster_infra_netris_server_names: "{{ cluster_infra_netris_server_names | unique | list }}"
  when:
    - cluster_agents_for_netris.resources | length > 0
    - netris_agent_server_name_label is defined
    - cluster_infra_netris_server_names is defined

- name: Set empty server names when no agents
  ansible.builtin.set_fact:
    cluster_infra_netris_server_names: []
  when: cluster_agents_for_netris.resources | length == 0

- name: Resolve resource class configuration
  ansible.builtin.set_fact:
    _netris_resource_class: "{{ cluster_infra_node_requests[0].resourceClass }}"
    _netris_rc_config: "{{ netris_resource_class_map[cluster_infra_node_requests[0].resourceClass] }}"

- name: Set resource class derived values
  ansible.builtin.set_fact:
    _netris_server_cluster_template_id: "{{ _netris_rc_config.server_cluster_template_id }}"
    _server_mgmt_interface: "{{ _netris_rc_config.mgmt_interface }}"
    _server_vpc_interfaces: "{{ _netris_rc_config.vpc_interfaces }}"

- name: Read server cluster template for server NICs
  ansible.builtin.include_role:
    name: netris.controller.server_cluster_template
  vars:
    server_cluster_template_id: "{{ _netris_server_cluster_template_id }}"
    server_cluster_template_state: read

- name: Create Netris server cluster with attached servers
  ansible.builtin.include_role:
    name: netris.controller.server_cluster
  vars:
    server_cluster_name: "{{ cluster_infra_name }}"
    server_cluster_state: present
    server_cluster_site_id: "{{ netris_site_id }}"
    server_cluster_tenant_id: "{{ netris_tenant_id | default(0) }}"
    server_cluster_servers: "{{ cluster_infra_netris_server_names | default([]) }}"
    server_cluster_template_id: "{{ _netris_server_cluster_template_id }}"
    server_cluster_tags: "{{ netris_server_cluster_tags | default([]) }}"
    server_cluster_shared: false
    server_cluster_admin_id: "{{ netris_tenant_id }}"
    server_cluster_admin_name: "{{ netris_tenant_name }}"

- name: Ensure Netris auth for SNAT lookup
  ansible.builtin.include_role:
    name: netris.controller.auth
  when: netris_session_cookie is not defined

- name: Look up existing SNAT rule
  ansible.builtin.uri:
    url: "{{ netris_controller_url }}/api/v2/nat"
    method: GET
    headers:
      Cookie: "connect.sid={{ netris_session_cookie }}"
    return_content: true
    status_code: 200
    timeout: "{{ netris_timeout | default(30) }}"
    validate_certs: "{{ netris_validate_certs | default(true) }}"
  register: _snat_lookup_resp
  no_log: true

- name: Find existing SNAT rule by name
  ansible.builtin.set_fact:
    _existing_snat: "{{ (_snat_lookup_resp.json.data | default([])) | selectattr('name', 'equalto', cluster_infra_name + '-snat') | list | first | default(none) }}"
  when: _snat_lookup_resp.json is mapping

- name: Set SNAT IP from existing rule
  ansible.builtin.set_fact:
    netris_nat_snat_ip: "{{ _existing_snat.snatToIP | ansible.utils.ipaddr('host/prefix') }}"
  when: _existing_snat is defined and _existing_snat is not none

- name: Allocate NAT IP from Netris IPAM (new cluster only)
  ansible.builtin.include_role:
    name: netris.controller.ipam
  vars:
    ipam_site_id: "{{ netris_site_id }}"
    ipam_purpose: nat
    ipam_count: 1
  when: _existing_snat is not defined or _existing_snat is none

- name: Set dynamically allocated NAT IP (new cluster only)
  ansible.builtin.set_fact:
    netris_nat_snat_ip: "{{ ipam_allocated_ips[0] }}/32"
  when: _existing_snat is not defined or _existing_snat is none

- name: Create SNAT rule for VPC subnet internet access (new cluster only)
  ansible.builtin.include_role:
    name: netris.controller.nat
  vars:
    nat_name: "{{ cluster_infra_name }}-snat"
    nat_state: present
    nat_site_id: "{{ netris_site_id }}"
    nat_vpc_id: "{{ server_cluster_vpc_id | default(netris_l4lb_vpc_id) }}"
    nat_vpc_name: "{{ server_cluster_vpc_name | default(netris_l4lb_vpc_name) | default('') }}"
    nat_action: snat
    nat_protocol: all
    nat_source_address: "{{ netris_template_ipv4_gateway | ansible.utils.ipsubnet }}"
    nat_snat_to_ip: "{{ netris_nat_snat_ip }}"
    nat_comment: "OSAC SNAT for {{ cluster_infra_name }}"
  when: _existing_snat is not defined or _existing_snat is none

- name: Set cluster_infra_network_name
  ansible.builtin.set_fact:
    cluster_infra_network_name: "{{ cluster_infra_name }}"

- name: Identify newly added agents
  ansible.builtin.set_fact:
    _newly_added_agents: "{{ cluster_agents_for_netris.resources | rejectattr('metadata.name', 'in', _existing_agent_names) | list }}"

- name: Create NMStateConfig CRs for all cluster agents
  ansible.builtin.include_role:
    name: osac.service.nmstate_config
  vars:
    nmstate_config_state: present
    nmstate_config_cluster_name: "{{ cluster_infra_name }}"
    nmstate_config_agents: "{{ cluster_agents_for_netris.resources }}"
    nmstate_config_interface_names: "{{ server_cluster_template_server_nics }}"
    nmstate_config_server_interfaces: "{{ _server_vpc_interfaces }}"
    nmstate_config_mgmt_interface: "{{ _server_mgmt_interface }}"
    nmstate_config_apply_live: false

- name: Apply NMState config on newly added agents
  ansible.builtin.include_role:
    name: osac.service.nmstate_config
  vars:
    nmstate_config_state: present
    nmstate_config_cluster_name: "{{ cluster_infra_name }}"
    nmstate_config_agents: "{{ _newly_added_agents }}"
    nmstate_config_interface_names: "{{ server_cluster_template_server_nics }}"
    nmstate_config_server_interfaces: "{{ _server_vpc_interfaces }}"
    nmstate_config_mgmt_interface: "{{ _server_mgmt_interface }}"
  when: _newly_added_agents | length > 0

- name: Add cluster order label to InfraEnv nmStateConfigLabelSelector
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: agent-install.openshift.io/v1beta1
      kind: InfraEnv
      metadata:
        name: "{{ hosted_cluster_default_infraenv }}"
        namespace: "{{ default_agent_namespace }}"
      spec:
        nmStateConfigLabelSelector:
          matchLabels: "{{ {cluster_order_label: cluster_infra_name} }}"

- name: Attach and approve agents assigned to the cluster
  ansible.builtin.include_role:
    name: osac.service.manage_agents
    tasks_from: attach_and_approve_all_new_agents
  vars:
    manage_agents_cluster_order_name: "{{ cluster_infra_name }}"
    manage_agents_cluster_network: "{{ cluster_infra_network_name | default(omit) }}"

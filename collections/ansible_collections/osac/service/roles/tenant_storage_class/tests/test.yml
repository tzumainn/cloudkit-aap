---
# Test playbook for osac.service.tenant_storage_class role.
# Each play is guarded by a `when` condition — only the play whose controlling
# variable is defined will run. Pass exactly one variable per invocation:
#
#   Test A1 (tenant SC exists):
#     ansible-playbook ... -e test_tenant_name=tenant-akshay
#
#   Test A2 (no tenant SC, Default SC exists — fallback):
#     ansible-playbook ... -e test_tenant_name_no_sc=tenant-akshay
#
#   Test A3 (no SCs at all — error path, requires Default SC deleted first):
#     ansible-playbook ... -e test_tenant_name_missing=tenant-akshay

- name: Test tenant_storage_class role
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Discover StorageClass for tenant
      ansible.builtin.include_role:
        name: osac.service.tenant_storage_class
      vars:
        tenant_storage_class_tenant_name: "{{ test_tenant_name }}"
      when: test_tenant_name is defined

    - name: Verify discovered StorageClass name is set
      ansible.builtin.assert:
        that:
          - tenant_storage_class_name is defined
          - tenant_storage_class_name | length > 0
        fail_msg: "Role did not set tenant_storage_class_name"
        success_msg: "Discovered StorageClass: {{ tenant_storage_class_name }}"
      when: test_tenant_name is defined

# ──────────────────────────────────────────────────────────────
# Test: Shared SC fallback
# Prerequisites: No SC labeled osac.openshift.io/tenant=<test_tenant_name_no_sc>
#                on the cluster, but one SC labeled osac.openshift.io/tenant=Default
#                exists.
# Expected: role succeeds, tenant_storage_class_name set to the Default SC name,
#           WARNING message logged about storage not being isolated.
# Run: ansible-playbook ... -e test_tenant_name_no_sc=tenant-akshay
# ──────────────────────────────────────────────────────────────
- name: Test tenant_storage_class role — shared Default SC fallback
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Discover StorageClass for tenant with no dedicated SC (should fall back to Default)
      ansible.builtin.include_role:
        name: osac.service.tenant_storage_class
      vars:
        tenant_storage_class_tenant_name: "{{ test_tenant_name_no_sc }}"
      when: test_tenant_name_no_sc is defined

    - name: Verify discovered StorageClass name is set (from Default SC)
      ansible.builtin.assert:
        that:
          - tenant_storage_class_name is defined
          - tenant_storage_class_name | length > 0
        fail_msg: "Role did not set tenant_storage_class_name when falling back to Default SC"
        success_msg: "Discovered shared StorageClass: {{ tenant_storage_class_name }}"
      when: test_tenant_name_no_sc is defined

# ──────────────────────────────────────────────────────────────
# Test: Neither tenant SC nor Default SC exists (error path)
# Prerequisites: No SC labeled with the tenant name and no SC labeled
#                osac.openshift.io/tenant=Default on the cluster.
# Expected: role fails with "No StorageClass found" message.
# Run: ansible-playbook ... -e test_tenant_name_missing=tenant-akshay
# ──────────────────────────────────────────────────────────────
- name: Test tenant_storage_class role — no SC at all (should fail)
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Run no-SC failure test when test_tenant_name_missing is defined
      when: test_tenant_name_missing is defined
      block:
        - name: Attempt to discover StorageClass for tenant with no SC at all (expected to fail)
          ansible.builtin.include_role:
            name: osac.service.tenant_storage_class
          vars:
            tenant_storage_class_tenant_name: "{{ test_tenant_name_missing }}"

        - name: This task should not be reached — role should have failed
          ansible.builtin.fail:
            msg: "Role did not fail as expected when no SC exists"

      rescue:
        - name: Verify role failed with expected message
          ansible.builtin.assert:
            that:
              - "'No StorageClass found' in ansible_failed_result.msg"
            fail_msg: "Role failed but with unexpected message: {{ ansible_failed_result.msg }}"
            success_msg: "Role failed as expected: {{ ansible_failed_result.msg }}"

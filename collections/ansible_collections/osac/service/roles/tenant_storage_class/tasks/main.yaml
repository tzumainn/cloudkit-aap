---
# Discover the tenant's StorageClass on the VM cluster.
# Queries StorageClasses by label osac.openshift.io/tenant only.
# CSP is allowed to create only one StorageClass per tenant.
# Sets tenant_storage_class_name or fails.

- name: Query StorageClasses for tenant on VM cluster
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: StorageClass
    label_selectors:
      - "osac.openshift.io/tenant={{ tenant_storage_class_tenant_name }}"
    kubeconfig: "{{ kubeconfig if (kubeconfig is defined and kubeconfig | length > 0) else omit }}"
  register: tenant_storage_classes

- name: Require exactly one StorageClass for tenant
  ansible.builtin.assert:
    that: tenant_storage_classes.resources | length == 1
    fail_msg: >-
      Expected exactly one StorageClass for tenant '{{ tenant_storage_class_tenant_name }}'
      (label osac.openshift.io/tenant). Found {{ tenant_storage_classes.resources | length }}.
      CSP should create only one StorageClass per tenant, labeled with osac.openshift.io/tenant, on the VM cluster.
    success_msg: "Found tenant StorageClass for '{{ tenant_storage_class_tenant_name }}'."

- name: Set tenant StorageClass name
  ansible.builtin.set_fact:
    tenant_storage_class_name: "{{ tenant_storage_classes.resources[0].metadata.name }}"

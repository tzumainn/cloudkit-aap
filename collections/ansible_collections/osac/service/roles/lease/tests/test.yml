---
# Unit tests for osac.service.lease role.
# Each play is guarded by a `when` condition -- only the play whose controlling
# variable is defined will run. Pass exactly one variable per invocation.
#
# REQUIRES: A Kubernetes cluster (kind or real) with KUBECONFIG set.
# Also requires POD_NAMESPACE, POD_NAME, POD_UID environment variables at
# the SHELL level (lookup('env') reads controller process env, not play-level).
#
# NOTE: The role creates Lease objects with ownerReferences pointing to a Pod.
# In test environments, create a dummy Pod first and export its UID:
#
#   kubectl run lease-test-pod --image=registry.k8s.io/pause:3.9 --restart=Never -n default
#   export POD_NAMESPACE=default
#   export POD_NAME=lease-test-pod
#   export POD_UID=$(kubectl get pod lease-test-pod -n default -o jsonpath='{.metadata.uid}')
#
#   Test 1 (acquire and release lifecycle):
#     ansible-playbook ... -e test_lifecycle=true
#
#   Test 2 (release nonexistent lease -- no error):
#     POD_NAMESPACE=default POD_NAME=x POD_UID=00000000-0000-0000-0000-000000000000 \
#       ansible-playbook ... -e test_release_nonexistent=true
#
#   Cleanup:
#     kubectl delete pod lease-test-pod -n default

# ──────────────────────────────────────────────────────────────
# Test 1: Full lifecycle -- acquire lease, verify, release
# Prereq: POD_NAMESPACE, POD_NAME, POD_UID must be set and
# the pod must exist (to prevent K8s GC of the Lease).
# Expected: Lease created with correct holder, then deleted
# ──────────────────────────────────────────────────────────────
- name: "Test lease -- full lifecycle"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Run lifecycle test
      when: test_lifecycle | default(false) | bool
      block:
        - name: Acquire lease
          ansible.builtin.include_role:
            name: osac.service.lease
          vars:
            lease_state: present
            lease_name: "test-lease-lifecycle"
            lease_holder: "lifecycle-holder"
            awx_job_id: "99999"

        - name: Verify lease exists
          kubernetes.core.k8s_info:
            api_version: coordination.k8s.io/v1
            kind: Lease
            namespace: "{{ lookup('env', 'POD_NAMESPACE') }}"
            name: "test-lease-lifecycle"
          register: lease_after_acquire

        - name: Assert lease created with correct holder and label
          ansible.builtin.assert:
            that:
              - lease_after_acquire.resources | length == 1
              - lease_after_acquire.resources[0].spec.holderIdentity == "lifecycle-holder"
              - lease_after_acquire.resources[0].metadata.labels['osac.openshift.io/aap-job-id'] == "job-99999"
            fail_msg: "Lease not created correctly: {{ lease_after_acquire.resources | default([]) }}"
            success_msg: "Lease acquired: holder={{ lease_after_acquire.resources[0].spec.holderIdentity }}"

      always:
        - name: Release lease
          ansible.builtin.include_role:
            name: osac.service.lease
          vars:
            lease_state: absent
            lease_name: "test-lease-lifecycle"
            lease_holder: "lifecycle-holder"

        - name: Verify lease deleted
          kubernetes.core.k8s_info:
            api_version: coordination.k8s.io/v1
            kind: Lease
            namespace: "{{ lookup('env', 'POD_NAMESPACE') }}"
            name: "test-lease-lifecycle"
          register: lease_after_release

        - name: Assert lease gone
          ansible.builtin.assert:
            that:
              - lease_after_release.resources | length == 0
            fail_msg: "Lease still exists after release"
            success_msg: "Lease released. Full lifecycle complete."

# ──────────────────────────────────────────────────────────────
# Test 2: Release nonexistent lease -- should not error
# Expected: role completes without error, no lease exists
# ──────────────────────────────────────────────────────────────
- name: "Test lease -- release nonexistent lease"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Release nonexistent lease (should not error)
      ansible.builtin.include_role:
        name: osac.service.lease
      vars:
        lease_state: absent
        lease_name: "does-not-exist-lease"
        lease_holder: "nobody"
      when: test_release_nonexistent | default(false) | bool

    - name: Verify no lease was created
      kubernetes.core.k8s_info:
        api_version: coordination.k8s.io/v1
        kind: Lease
        namespace: "{{ lookup('env', 'POD_NAMESPACE') }}"
        name: "does-not-exist-lease"
      register: result
      when: test_release_nonexistent | default(false) | bool

    - name: Assert lease does not exist
      ansible.builtin.assert:
        that:
          - result.resources | length == 0
        fail_msg: "Unexpected lease found: {{ result.resources }}"
        success_msg: "Release nonexistent lease completed without error, no lease exists"
      when: test_release_nonexistent | default(false) | bool

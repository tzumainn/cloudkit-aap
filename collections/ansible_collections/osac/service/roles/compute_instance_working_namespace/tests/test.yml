---
# Unit tests for osac.service.compute_instance_working_namespace role.
# Each play is guarded by a `when` condition -- only the play whose controlling
# variable is defined will run. Pass exactly one variable per invocation.
#
# REQUIRES: A Kubernetes cluster (kind or real) with KUBECONFIG set and
# OSAC CRDs installed (Tenant CRD at minimum).
#
# Setup:
#   export KUBECONFIG=<path-to-kubeconfig>
#   # Install OSAC CRDs:
#   kubectl apply -f /path/to/osac-operator/config/crd/bases/osac.openshift.io_tenants.yaml
#   # Create test Tenant with status.namespace set:
#   kubectl apply -f - <<EOF
#   apiVersion: osac.openshift.io/v1alpha1
#   kind: Tenant
#   metadata:
#     name: test-tenant
#     namespace: default
#   status:
#     namespace: test-tenant-vm-work
#   EOF
#
#   Test 1 (happy path -- tenant found with namespace):
#     ansible-playbook ... -e test_tenant_found=true
#
#   Test 2 (tenant not found -- should fail):
#     ansible-playbook ... -e test_tenant_not_found=true
#
#   Test 3 (pre-defined -- role skips lookup):
#     ansible-playbook ... -e test_predefined=true

# ──────────────────────────────────────────────────────────────
# Test 1: Tenant found with status.namespace set
# Expected: compute_instance_working_namespace set from tenant
# ──────────────────────────────────────────────────────────────
- name: "Test compute_instance_working_namespace -- tenant found"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Run tenant-found test
      when: test_tenant_found | default(false) | bool
      block:
        - name: Create test Tenant
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: osac.openshift.io/v1alpha1
              kind: Tenant
              metadata:
                name: ciwn-test-tenant
                namespace: default

        - name: Patch Tenant status via status subresource
          ansible.builtin.command:
            cmd: >-
              kubectl patch tenant ciwn-test-tenant -n default
              --type=merge --subresource=status
              -p '{"status":{"namespace":"ciwn-test-vm-work","phase":"Ready"}}'
          changed_when: true

        - name: Run compute_instance_working_namespace role
          ansible.builtin.include_role:
            name: osac.service.compute_instance_working_namespace
          vars:
            compute_instance:
              status:
                tenantReference:
                  name: ciwn-test-tenant
                  namespace: default

        - name: Verify namespace resolved from tenant
          ansible.builtin.assert:
            that:
              - compute_instance_working_namespace is defined
              - compute_instance_working_namespace == "ciwn-test-vm-work"
            fail_msg: "Expected 'ciwn-test-vm-work', got '{{ compute_instance_working_namespace | default('undefined') }}'"
            success_msg: "Working namespace resolved: {{ compute_instance_working_namespace }}"

      always:
        - name: Cleanup -- delete test Tenant
          kubernetes.core.k8s:
            state: absent
            api_version: osac.openshift.io/v1alpha1
            kind: Tenant
            namespace: default
            name: ciwn-test-tenant

# ──────────────────────────────────────────────────────────────
# Test 2: Tenant not found -- should fail
# Expected: role fails with "Tenant namespace was not found"
# ──────────────────────────────────────────────────────────────
- name: "Test compute_instance_working_namespace -- tenant not found (should fail)"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Run not-found failure test
      when: test_tenant_not_found | default(false) | bool
      block:
        - name: Run role with nonexistent tenant reference
          ansible.builtin.include_role:
            name: osac.service.compute_instance_working_namespace
          vars:
            compute_instance:
              status:
                tenantReference:
                  name: nonexistent-tenant
                  namespace: default

        - name: This should not be reached
          ansible.builtin.fail:
            msg: "Role did not fail when tenant was not found"

      rescue:
        - name: Verify role failed with expected message
          ansible.builtin.assert:
            that:
              - "'not found' in ansible_failed_result.msg"
            fail_msg: "Role failed but with unexpected message: {{ ansible_failed_result.msg }}"
            success_msg: "Role failed as expected: {{ ansible_failed_result.msg }}"

# ──────────────────────────────────────────────────────────────
# Test 3: Pre-defined namespace -- role skips lookup
# Expected: pre-defined value preserved, no K8s lookup
# ──────────────────────────────────────────────────────────────
- name: "Test compute_instance_working_namespace -- pre-defined preserved"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Pre-define compute_instance_working_namespace
      ansible.builtin.set_fact:
        compute_instance_working_namespace: "my-custom-vm-namespace"
      when: test_predefined | default(false) | bool

    - name: Run role (should skip lookup)
      ansible.builtin.include_role:
        name: osac.service.compute_instance_working_namespace
      vars:
        compute_instance:
          status:
            tenantReference:
              name: does-not-matter
              namespace: default
      when: test_predefined | default(false) | bool

    - name: Verify pre-defined value preserved
      ansible.builtin.assert:
        that:
          - compute_instance_working_namespace == "my-custom-vm-namespace"
        fail_msg: "Pre-defined namespace was overwritten: {{ compute_instance_working_namespace }}"
        success_msg: "Pre-defined namespace preserved: {{ compute_instance_working_namespace }}"
      when: test_predefined | default(false) | bool

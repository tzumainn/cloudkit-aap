---
- name: Log VM create secrets step execution
  ansible.builtin.lineinfile:
    path: /tmp/osac_test_overrides.log
    line: "{{ ansible_date_time.iso8601 }} | vm_create_secrets | {{ compute_instance_name }}"
    create: true

# Note: Skip secret creation for testing
- name: Skip secret creation (test mode)
  ansible.builtin.debug:
    msg: "Test mode - skipping user-data and SSH secret creation"

---
- name: Log VM create validate step execution
  ansible.builtin.lineinfile:
    path: /tmp/osac_test_overrides.log
    line: "{{ ansible_date_time.iso8601 }} | vm_create_validate | {{ compute_instance_name }}"
    create: true

- name: Delegate to original validate role
  ansible.builtin.include_role:
    name: osac.templates.ocp_virt_vm
    tasks_from: create_validate.yaml

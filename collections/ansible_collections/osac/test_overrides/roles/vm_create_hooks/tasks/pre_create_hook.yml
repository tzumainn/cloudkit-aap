---
- name: Log VM create pre_create_hook step execution
  ansible.builtin.lineinfile:
    path: /tmp/osac_test_overrides.log
    line: "{{ ansible_date_time.iso8601 }} | vm_create_pre_create_hook | {{ compute_instance_name }}"
    create: true

- name: Delegate to original pre_create_hook role
  ansible.builtin.include_role:
    name: osac.templates.ocp_virt_vm
    tasks_from: create_pre_create_hook.yaml

---
- name: Log VM delete resources step execution
  ansible.builtin.lineinfile:
    path: /tmp/osac_test_overrides.log
    line: "{{ ansible_date_time.iso8601 }} | vm_delete_resources | {{ compute_instance_name }}"
    create: true

- name: Delegate to original delete resources role
  ansible.builtin.include_role:
    name: osac.templates.ocp_virt_vm
    tasks_from: delete_resources.yaml

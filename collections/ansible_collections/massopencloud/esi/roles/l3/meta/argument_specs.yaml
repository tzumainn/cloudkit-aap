argument_specs:
  main:
    options:
      network_id:
        description: |
          ID of the network associated with the subnet or router
        type: "str"
        required: false
      router_name_or_id:
        description: |
          Name of the router when state is `present`.
          Name or ID of router to be deleted when state is `absent`; the deletion will fail if the router name is not unique.
        type: "str"
        required: false
      router_subnets:
        description: |
          List of names or IDs of the subnets to attach to the router
        type: "list"
        required: false
      subnet_name_or_id:
        description: |
          Name of the subnet when state is `present`.
          Name or ID of subnet to be deleted when state is `absent`; the deletion will fail if the subnet name is not unique.
        type: "str"
        required: false

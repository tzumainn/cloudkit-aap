---
# =============================================================================
# NICo authentication
# =============================================================================

- name: Validate required NICo credentials are configured
  ansible.builtin.assert:
    that:
      - nico_api_url | length > 0
      - nico_client_id | length > 0
      - nico_client_secret | length > 0
      - nico_org | length > 0
      - nico_tenant_id | length > 0
      - nico_site_id | length > 0
      - nico_ssa_token_url | length > 0
      - nico_ssa_token_url is match('^https://')
    fail_msg: >
      NICo credentials not configured or insecure. Ensure cluster-fulfillment-ig Secret
      contains NVIDIA_BMM_API_URL, NVIDIA_BMM_CLIENT_ID, NVIDIA_BMM_CLIENT_SECRET,
      NVIDIA_BMM_ORG, NVIDIA_BMM_TENANT_ID, NVIDIA_BMM_SITE_ID, NVIDIA_BMM_SSA_TOKEN_URL.
      Token URL must use https://.

- name: Exchange client credentials for JWT token
  ansible.builtin.uri:
    url: "{{ nico_ssa_token_url }}"
    method: POST
    url_username: "{{ nico_client_id }}"
    url_password: "{{ nico_client_secret }}"
    force_basic_auth: true
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      scope: "{{ nico_oauth_scope | default('') }}"
    status_code: 200
  register: nico_token_response
  no_log: true

- name: Set NICo API token for subsequent requests
  ansible.builtin.set_fact:
    nico_api_token: "{{ nico_token_response.json.access_token }}"
  no_log: true

# =============================================================================
# Detach agents and delete infrastructure
# =============================================================================

# NICo agents connect via VPC, not ESI L2 network attachment
- name: Set skip network detach for NICo
  ansible.builtin.set_fact:
    manage_agents_skip_network_detach: true

- name: List agents for this cluster before detachment
  kubernetes.core.k8s_info:
    kind: Agent
    api_version: agent-install.openshift.io/v1beta1
    namespace: "{{ default_agent_namespace }}"
    label_selectors:
      - "{{ cluster_order_label }}={{ cluster_infra_name }}"
  register: nico_agents_to_delete

- name: Detach agents from cluster
  ansible.builtin.include_role:
    name: osac.service.manage_agents
    tasks_from: detach_and_unlabel_all_removed_agents
  vars:
    manage_agents_cluster_order_name: "{{ cluster_infra_name }}"

# NICo agents are ephemeral — delete the Agent CRs after detachment
- name: Delete Agent resources
  when: nico_agents_to_delete.resources | length > 0
  kubernetes.core.k8s:
    state: absent
    api_version: agent-install.openshift.io/v1beta1
    kind: Agent
    name: "{{ item.metadata.name }}"
    namespace: "{{ default_agent_namespace }}"
  loop: "{{ nico_agents_to_delete.resources }}"
  loop_control:
    label: "Delete agent {{ item.metadata.name }}"
  failed_when: false

- name: Set NICo infrastructure variables from cluster_infra context
  ansible.builtin.set_fact:
    nico_infra_name: "{{ cluster_infra_name }}"
    nico_infra_namespace: "{{ cluster_working_namespace }}"

- name: Delete NICo cluster infrastructure
  block:
    - name: Run NICo infrastructure deletion
      ansible.builtin.include_tasks: delete_nico_infra.yaml
  rescue:
    - name: Log infrastructure deletion failure
      ansible.builtin.fail:
        msg: >
          NICo infrastructure deletion failed — manual cleanup may be required.
          Check NICo console for orphaned VPCs, prefixes, peerings, or instances
          for cluster '{{ cluster_infra_name }}'.
          Error: {{ ansible_failed_result.msg | default('unknown error') }}

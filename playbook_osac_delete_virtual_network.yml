---
- name: Delete a VirtualNetwork resource
  hosts: localhost
  gather_facts: false

  vars:
    virtual_network: "{{ ansible_eda.event.payload }}"
    virtual_network_name: "{{ ansible_eda.event.payload.metadata.name }}"
    template_parameters: {}

  pre_tasks:
    - name: Show EDA Event
      ansible.builtin.debug:
        var: ansible_eda.event.payload

  tasks:
    - name: Display VirtualNetwork information
      ansible.builtin.debug:
        msg:
          - "Deleting VirtualNetwork: {{ virtual_network_name }}"

    - name: Call the VirtualNetwork role
      ansible.builtin.include_role:
        name: virtual_network
        tasks_from: delete

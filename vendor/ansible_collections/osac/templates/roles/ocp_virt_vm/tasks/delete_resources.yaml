---
- name: Get VirtualMachine info for floating IP cleanup
  kubernetes.core.k8s_info:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ compute_instance_name }}"
    namespace: "{{ vm_target_namespace }}"
  register: vm_info

- name: Check if VM instance exists
  kubernetes.core.k8s_info:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: kubevirt.io/v1
    kind: VirtualMachineInstance
    name: "{{ compute_instance_name }}"
    namespace: "{{ vm_target_namespace }}"
  register: vm_exists

- name: Stop VirtualMachine
  kubernetes.core.k8s:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ compute_instance_name }}"
    namespace: "{{ vm_target_namespace }}"
    state: present
    definition:
      spec:
        runStrategy: Halted
  when: vm_exists.resources

- name: Wait for VM to stop
  kubernetes.core.k8s_info:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ compute_instance_name }}"
    namespace: "{{ vm_target_namespace }}"
    wait: true
    wait_condition:
      type: Ready
      status: "False"
    wait_timeout: 300
  when: vm_exists.resources

- name: Delete VirtualMachine
  kubernetes.core.k8s:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ compute_instance_name }}"
    namespace: "{{ vm_target_namespace }}"
    state: absent
    wait: true
    wait_timeout: 300

- name: Delete VM service (if it exists)
  kubernetes.core.k8s:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: v1
    kind: Service
    name: "{{ compute_instance_name }}-service"
    namespace: "{{ vm_target_namespace }}"
    state: absent

- name: Delete VM load balancer service
  kubernetes.core.k8s:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: v1
    kind: Service
    name: "{{ compute_instance_name }}-load-balancer"
    namespace: "{{ vm_target_namespace }}"
    state: absent

- name: Delete root disk DataVolume
  kubernetes.core.k8s:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    name: "{{ compute_instance_name }}-root-disk"
    namespace: "{{ vm_target_namespace }}"
    state: absent
    wait: true
    wait_timeout: 300

- name: Delete additional disk DataVolumes
  kubernetes.core.k8s:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    name: "{{ compute_instance_name }}-disk-{{ idx + 1 }}"
    namespace: "{{ vm_target_namespace }}"
    state: absent
    wait: true
    wait_timeout: 300
  loop: "{{ compute_instance.spec.additionalDisks | default([]) }}"
  loop_control:
    index_var: idx
  when: (compute_instance.spec.additionalDisks | default([])) | length > 0

- name: Delete user-data secret
  kubernetes.core.k8s:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: v1
    kind: Secret
    name: "{{ compute_instance_name }}-user-data"
    namespace: "{{ vm_target_namespace }}"
    state: absent
  register: delete_user_data_secret
  failed_when:
    - delete_user_data_secret.failed is defined
    - delete_user_data_secret.failed
    - "'not found' not in (delete_user_data_secret.msg | default(''))"

- name: Delete cloud-init secret
  kubernetes.core.k8s:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: v1
    kind: Secret
    name: "{{ compute_instance_name }}-cloud-init"
    namespace: "{{ vm_target_namespace }}"
    state: absent
  register: delete_cloud_init_secret
  failed_when:
    - delete_cloud_init_secret.failed is defined
    - delete_cloud_init_secret.failed
    - "'not found' not in (delete_cloud_init_secret.msg | default(''))"

- name: Delete ssh public key secret
  kubernetes.core.k8s:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: v1
    kind: Secret
    name: "{{ compute_instance_name }}-ssh-public-key"
    namespace: "{{ vm_target_namespace }}"
    state: absent
  register: delete_ssh_secret
  failed_when:
    - delete_ssh_secret.failed is defined
    - delete_ssh_secret.failed
    - "'not found' not in (delete_ssh_secret.msg | default(''))"

- name: Display deletion status
  ansible.builtin.debug:
    msg:
      - "Virtual Machine '{{ compute_instance_name }}' deletion completed"
      - "Namespace: {{ vm_target_namespace }}"
      - "All associated resources have been removed"

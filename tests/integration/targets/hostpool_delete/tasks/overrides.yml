---
- name: HostPool Delete - Override Test Setup
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Read HostPool fixture
      ansible.builtin.set_fact:
        test_hostpool: "{{ lookup('file', '../../../fixtures/hostpool-test.yaml') | from_yaml }}"

    - name: Clear override log
      ansible.builtin.file:
        path: /tmp/osac_test_overrides.log
        state: absent

    - name: Create empty override log
      ansible.builtin.file:
        path: /tmp/osac_test_overrides.log
        state: touch

    - name: Set test variables with all overrides
      ansible.builtin.set_fact:
        ansible_eda:
          event:
            payload: "{{ test_hostpool }}"
        hostpool_working_namespace: "hostpool-test-hostpool-work"

        # Override 3 extension points
        hook_workflow_start:
          name: osac.test_overrides.workflow_hooks
          tasks_from: workflow_start.yml

        hook_workflow_complete:
          name: osac.test_overrides.workflow_hooks
          tasks_from: workflow_complete.yml

        # Override infrastructure step to skip OpenStack/ESI calls
        step_hostpool_infra_override:
          name: osac.test_overrides.workflow_hooks
          tasks_from: hostpool_infra.yml

        workflow_name: hostpool_delete

- name: Import hostpool delete workflow with overrides
  ansible.builtin.import_playbook: osac.workflows.hostpool.delete

- name: Verify override results
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Read override log
      ansible.builtin.slurp:
        path: /tmp/osac_test_overrides.log
      register: override_log_content

    - name: Parse override log
      ansible.builtin.set_fact:
        override_log: "{{ override_log_content.content | b64decode }}"

    - name: Display override log for debugging
      ansible.builtin.debug:
        var: override_log

    - name: Verify all overrides executed
      ansible.builtin.assert:
        that:
          - "'workflow_start' in override_log"
          - "'workflow_complete' in override_log"
          - "'hostpool_infra' in override_log"
        fail_msg: "Not all override points were executed. Log: {{ override_log }}"

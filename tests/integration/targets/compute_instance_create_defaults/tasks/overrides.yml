---
- name: Compute Instance Create Defaults - Override Test Setup
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Read minimal ComputeInstance fixture (no spec fields)
      ansible.builtin.set_fact:
        test_compute_instance: "{{ lookup('file', '../../../fixtures/computeinstance-defaults-test.yaml') | from_yaml }}"

    - name: Clear override log
      ansible.builtin.file:
        path: /tmp/osac_test_overrides.log
        state: absent

    - name: Create empty override log
      ansible.builtin.file:
        path: /tmp/osac_test_overrides.log
        state: touch
        mode: "0600"

    - name: Set test variables with all overrides
      ansible.builtin.set_fact:
        ansible_eda:
          event:
            payload: "{{ test_compute_instance }}"
        compute_instance_working_namespace: "computeinstance-test-vm-work"

        # Override workflow extension points
        hook_workflow_start:
          name: osac.test_overrides.workflow_hooks
          tasks_from: workflow_start.yml

        hook_workflow_complete:
          name: osac.test_overrides.workflow_hooks
          tasks_from: workflow_complete.yml

        # Override template extension points
        create_step_secrets_override:
          name: osac.test_overrides.vm_create_hooks
          tasks_from: secrets.yml

        create_step_modify_vm_spec_override:
          name: osac.test_overrides.vm_create_hooks
          tasks_from: modify_vm_spec.yml

        create_step_pre_create_hook_override:
          name: osac.test_overrides.vm_create_hooks
          tasks_from: pre_create_hook.yml

        create_step_resources_override:
          name: osac.test_overrides.vm_create_hooks
          tasks_from: resources.yml

        create_step_post_create_hook_override:
          name: osac.test_overrides.vm_create_hooks
          tasks_from: post_create_hook.yml

        create_step_wait_annotate_override:
          name: osac.test_overrides.vm_create_hooks
          tasks_from: wait_annotate.yml

        workflow_name: compute_instance_create_defaults

- name: Import compute instance create workflow with overrides
  ansible.builtin.import_playbook: osac.workflows.compute_instance.create

- name: Verify override results with default spec values
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Read override log
      ansible.builtin.slurp:
        path: /tmp/osac_test_overrides.log
      register: override_log_content

    - name: Parse override log
      ansible.builtin.set_fact:
        override_log: "{{ override_log_content.content | b64decode }}"

    - name: Verify all overrides executed
      ansible.builtin.assert:
        that:
          - "'workflow_start' in override_log"
          - "'workflow_complete' in override_log"
          - "'vm_create_secrets' in override_log"
          - "'vm_create_modify_vm_spec' in override_log"
          - "'vm_create_pre_create_hook' in override_log"
          - "'vm_create_resources' in override_log"
          - "'vm_create_post_create_hook' in override_log"
          - "'vm_create_wait_annotate' in override_log"
        fail_msg: "Not all override points were executed. Log: {{ override_log }}"

    - name: Verify default CPU cores survived overrides
      ansible.builtin.assert:
        that:
          - vm_cpu_cores | int == 2
        fail_msg: "Expected default cpu cores of 2 after overrides, got {{ vm_cpu_cores | default('undefined') }}"

    - name: Verify default memory survived overrides
      ansible.builtin.assert:
        that:
          - vm_memory == "2Gi"
        fail_msg: "Expected default memory of 2Gi after overrides, got {{ vm_memory | default('undefined') }}"

    - name: Verify default boot disk size survived overrides
      ansible.builtin.assert:
        that:
          - vm_boot_disk_size == "10Gi"
        fail_msg: "Expected default boot disk size of 10Gi after overrides, got {{ vm_boot_disk_size | default('undefined') }}"

    - name: Verify default image source survived overrides
      ansible.builtin.assert:
        that:
          - vm_image_source == "quay.io/containerdisks/fedora:latest"
        fail_msg: "Expected default image source after overrides, got {{ vm_image_source | default('undefined') }}"

    - name: Verify default run strategy survived overrides
      ansible.builtin.assert:
        that:
          - vm_run_strategy == "Always"
        fail_msg: "Expected default run strategy of Always after overrides, got {{ vm_run_strategy | default('undefined') }}"

---
- name: Compute Instance Delete - Override Test Setup
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Read ComputeInstance fixture
      ansible.builtin.set_fact:
        test_compute_instance: "{{ lookup('file', '../../../fixtures/computeinstance-test.yaml') | from_yaml }}"

    - name: Clear override log
      ansible.builtin.file:
        path: /tmp/osac_test_overrides.log
        state: absent

    - name: Create empty override log
      ansible.builtin.file:
        path: /tmp/osac_test_overrides.log
        state: touch

    - name: Set test variables with all overrides
      ansible.builtin.set_fact:
        ansible_eda:
          event:
            payload: "{{ test_compute_instance }}"
        tenant_target_namespace: "computeinstance-test-vm-work"

        # Override 3 workflow extension points
        hook_workflow_start:
          name: osac.test_overrides.workflow_hooks
          tasks_from: workflow_start.yml

        hook_workflow_complete:
          name: osac.test_overrides.workflow_hooks
          tasks_from: workflow_complete.yml

        # NOTE: Using real template (osac.templates.ocp_virt_vm from fixture)
        # We override the hooks below to test the override mechanism

        # Override 3 template extension points
        delete_step_pre_delete_hook_override:
          name: osac.test_overrides.vm_delete_hooks
          tasks_from: pre_delete_hook.yml

        delete_step_resources_override:
          name: osac.test_overrides.vm_delete_hooks
          tasks_from: resources.yml

        delete_step_post_delete_hook_override:
          name: osac.test_overrides.vm_delete_hooks
          tasks_from: post_delete_hook.yml

        workflow_name: compute_instance_delete

- name: Import compute instance delete workflow with overrides
  ansible.builtin.import_playbook: osac.workflows.compute_instance.delete

- name: Verify override results
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Read override log
      ansible.builtin.slurp:
        path: /tmp/osac_test_overrides.log
      register: override_log_content

    - name: Parse override log
      ansible.builtin.set_fact:
        override_log: "{{ override_log_content.content | b64decode }}"

    - name: Display override log for debugging
      ansible.builtin.debug:
        var: override_log

    - name: Verify all overrides executed
      ansible.builtin.assert:
        that:
          - "'workflow_start' in override_log"
          - "'workflow_complete' in override_log"
          - "'vm_delete_pre_delete_hook' in override_log"
          - "'vm_delete_resources' in override_log"
          - "'vm_delete_post_delete_hook' in override_log"
        fail_msg: "Not all override points were executed. Log: {{ override_log }}"

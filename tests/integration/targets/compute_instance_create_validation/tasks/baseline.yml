---
- name: Compute Instance Validation - Valid Parameters Test
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Read minimal ComputeInstance fixture
      ansible.builtin.set_fact:
        test_compute_instance: "{{ lookup('file', '../../../fixtures/computeinstance-defaults-test.yaml') | from_yaml }}"

    - name: Set test variables with valid template_parameters
      ansible.builtin.set_fact:
        ansible_eda:
          event:
            payload: "{{ test_compute_instance }}"
        compute_instance_working_namespace: "computeinstance-test-vm-work"
        template_parameters:
          exposed_ports: "22/tcp,80/tcp,443/tcp"
        create_step_resources_override:
          name: osac.workflows.workflow_helpers
          tasks_from: noop.yml
        create_step_wait_annotate_override:
          name: osac.workflows.workflow_helpers
          tasks_from: noop.yml

- name: Import compute instance create workflow (valid params)
  ansible.builtin.import_playbook: osac.workflows.compute_instance.create

- name: Verify valid parameters accepted
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Verify custom exposed_ports value applied
      ansible.builtin.assert:
        that:
          - params is defined
          - params.exposed_ports == "22/tcp,80/tcp,443/tcp"
        fail_msg: "Expected exposed_ports='22/tcp,80/tcp,443/tcp', got {{ (params | default({})).exposed_ports | default('undefined') }}"

- name: Compute Instance Validation - Invalid Pattern Rejection
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Read minimal ComputeInstance fixture
      ansible.builtin.set_fact:
        test_compute_instance: "{{ lookup('file', '../../../fixtures/computeinstance-defaults-test.yaml') | from_yaml }}"

    - name: Find ocp_virt_vm role path
      ansible.builtin.set_fact:
        ocp_virt_vm_role_path: "{{ lookup('ansible.builtin.first_found', {'paths': lookup('ansible.builtin.config', 'DEFAULT_ROLES_PATH'), 'patterns': ['osac/templates/roles/ocp_virt_vm']}) | default('') }}"
      failed_when: false

    - name: Resolve role path via collection
      ansible.builtin.command:
        cmd: ansible-galaxy collection list osac.templates --format json
      register: collection_info
      changed_when: false
      when: ocp_virt_vm_role_path | default('') == ''

    - name: Set role path from collection info
      ansible.builtin.set_fact:
        ocp_virt_vm_role_path: "{{ (collection_info.stdout | from_json | dict2items | default([{'key': ''}]) | first).key }}/osac/templates/roles/ocp_virt_vm"
      when: ocp_virt_vm_role_path | default('') == ''

    - name: Validate with invalid exposed_ports pattern
      ansible.builtin.set_fact:
        invalid_result: "{{ {'exposed_ports': 'not-a-valid-port'} | osac.templates.template_validate_params(ocp_virt_vm_role_path) }}"
      register: validation_result
      ignore_errors: true

    - name: Verify validation rejected invalid pattern
      ansible.builtin.assert:
        that:
          - validation_result is failed
          - "'does not match pattern' in validation_result.msg"
        fail_msg: "Expected validation to reject 'not-a-valid-port' but it {{ 'passed' if validation_result is success else 'failed with: ' + (validation_result.msg | default('unknown error')) }}"

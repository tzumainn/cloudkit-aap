---
# Integration test for osac.service.compute_instance_working_namespace role.
# Runs all scenarios: tenant found, not found (expected failure), pre-defined.
#
# Requires OSAC Tenant CRD installed on the cluster.

# ── Test 1: Tenant found with status.namespace ──
- name: "ComputeInstanceWorkingNamespace - Test tenant found"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Test tenant found
      block:
        - name: Create test Tenant
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: osac.openshift.io/v1alpha1
              kind: Tenant
              metadata:
                name: ciwn-test-tenant
                namespace: osac-system

        - name: Patch Tenant status via status subresource
          ansible.builtin.command:
            cmd: >-
              kubectl patch tenant ciwn-test-tenant -n osac-system
              --type=merge --subresource=status
              -p '{"status":{"namespace":"ciwn-test-vm-work","phase":"Ready"}}'
          changed_when: true

        - name: Run compute_instance_working_namespace role
          ansible.builtin.include_role:
            name: osac.service.compute_instance_working_namespace
          vars:
            compute_instance:
              status:
                tenantReference:
                  name: ciwn-test-tenant
                  namespace: osac-system

        - name: Verify namespace resolved from tenant
          ansible.builtin.assert:
            that:
              - compute_instance_working_namespace is defined
              - compute_instance_working_namespace == "ciwn-test-vm-work"
            fail_msg: "Expected 'ciwn-test-vm-work', got '{{ compute_instance_working_namespace | default('undefined') }}'"
            success_msg: "Tenant found: passed"

      always:
        - name: Cleanup -- delete test Tenant
          kubernetes.core.k8s:
            state: absent
            api_version: osac.openshift.io/v1alpha1
            kind: Tenant
            namespace: osac-system
            name: ciwn-test-tenant

# ── Test 2: Tenant not found (expected failure) ──
- name: "ComputeInstanceWorkingNamespace - Test tenant not found (should fail)"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Run not-found failure test
      block:
        - name: Reset fact from previous play
          ansible.builtin.set_fact:
            compute_instance_working_namespace: null

        - name: Run role with nonexistent tenant reference
          ansible.builtin.include_role:
            name: osac.service.compute_instance_working_namespace
          vars:
            compute_instance:
              status:
                tenantReference:
                  name: nonexistent-tenant
                  namespace: osac-system

        - name: This should not be reached
          ansible.builtin.fail:
            msg: "Role did not fail when tenant was not found"

      rescue:
        - name: Verify role failed with expected message
          ansible.builtin.assert:
            that:
              - "'Tenant namespace was not found' in ansible_failed_result.msg"
            fail_msg: "Role failed but with unexpected message: {{ ansible_failed_result.msg }}"
            success_msg: "Tenant not found failure: passed"

# ── Test 3: Pre-defined preserved ──
- name: "ComputeInstanceWorkingNamespace - Test pre-defined preserved"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Pre-define compute_instance_working_namespace
      ansible.builtin.set_fact:
        compute_instance_working_namespace: "my-custom-vm-namespace"

    - name: Run role (should skip lookup)
      ansible.builtin.include_role:
        name: osac.service.compute_instance_working_namespace
      vars:
        compute_instance:
          status:
            tenantReference:
              name: does-not-matter
              namespace: osac-system

    - name: Verify pre-defined value preserved
      ansible.builtin.assert:
        that:
          - compute_instance_working_namespace == "my-custom-vm-namespace"
        fail_msg: "Pre-defined namespace was overwritten"
        success_msg: "Pre-defined preserved: passed"

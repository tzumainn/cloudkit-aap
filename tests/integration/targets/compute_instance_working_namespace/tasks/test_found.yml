---
- name: "ComputeInstanceWorkingNamespace - Test tenant found"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Test tenant found
      block:
        - name: Create test Tenant
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: osac.openshift.io/v1alpha1
              kind: Tenant
              metadata:
                name: ciwn-test-tenant
                namespace: osac-system

        - name: Patch Tenant status via status subresource
          ansible.builtin.command:
            cmd: >-
              kubectl patch tenant ciwn-test-tenant -n osac-system
              --type=merge --subresource=status
              -p '{"status":{"namespace":"ciwn-test-vm-work","phase":"Ready"}}'
          changed_when: true

        - name: Run compute_instance_working_namespace role
          ansible.builtin.include_role:
            name: osac.service.compute_instance_working_namespace
          vars:
            compute_instance:
              status:
                tenantReference:
                  name: ciwn-test-tenant
                  namespace: osac-system

        - name: Verify namespace resolved from tenant
          ansible.builtin.assert:
            that:
              - compute_instance_working_namespace is defined
              - compute_instance_working_namespace == "ciwn-test-vm-work"
            fail_msg: "Expected 'ciwn-test-vm-work', got '{{ compute_instance_working_namespace | default('undefined') }}'"
            success_msg: "Tenant found: passed"

      always:
        - name: Cleanup -- delete test Tenant
          kubernetes.core.k8s:
            state: absent
            api_version: osac.openshift.io/v1alpha1
            kind: Tenant
            namespace: osac-system
            name: ciwn-test-tenant

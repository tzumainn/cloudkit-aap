---
apiVersion: osac.openshift.io/v1alpha1
kind: ComputeInstance
metadata:
  name: test-vm
  namespace: osac-system
spec:
  templateID: osac.templates.ocp_virt_vm
  cores: 2
  memoryGiB: 4
  bootDisk:
    sizeGiB: 20
  image:
    sourceType: registry
    sourceRef: "quay.io/containerdisks/fedora:latest"
  runStrategy: "Always"
status:
  desiredConfigVersion: "1"
